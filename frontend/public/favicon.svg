<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    
    <!-- Eco Leaf Gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <!-- Bolt Energy Gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FACC15" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Container Icon Shape -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Eco Leaf Base -->
  <path d="M 256 70 C 130 70 80 180 80 310 C 80 400 150 440 256 440 C 362 440 432 400 432 310 C 432 180 382 70 256 70 Z" fill="url(#leafGrad)" opacity="0.95" />
  
  <!-- Inner Leaf Detail / Dark Overlay for contrast -->
  <path d="M 256 100 C 160 100 110 190 110 300 C 110 380 170 410 256 410 C 342 410 402 380 402 300 C 402 190 352 100 256 100 Z" fill="#0F172A" opacity="0.35" />

  <!-- Lightning Bolt (Electricity) -->
  <path filter="url(#glow)" d="M 280 110 L 170 270 H 260 L 220 410 L 350 240 H 260 L 280 110 Z" fill="url(#boltGrad)" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Eco Sparkle Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#34D399" stroke-width="8" stroke-dasharray="24 16" opacity="0.4" />
</svg>